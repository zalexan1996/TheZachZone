# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  solution: './TheZachZone.sln'
  tzzProjectDirectory: './APIs/TZZ.API'
  tzzProject: './APIs/TZZ.API/TZZ.API.csproj'
  tgzProjectDirectory: './APIs/TGZ.API'
  tgzProject: './APIs/TGZ.API/TGZ.API.csproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Debug'

steps:
- task: NuGetToolInstaller@1

- task: NuGetCommand@2
  inputs:
    restoreSolution: '$(solution)'

- task: DotNetCoreCLI@2
  inputs:
    command: 'build'
    projects: '$(solution)'
    configuration: $buildConfiguration

- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '$(tzzProject)'
    arguments: '--configuration $(buildConfiguration) --output $(build.artifactstagingdirectory)/TZZ.API --no-build'
    zipAfterPublish: false
    modifyOutputPath: false

- task: DotNetCoreCLI@2
  inputs:
    command: 'publish'
    publishWebProjects: false
    projects: '$(tgzProject)'
    arguments: '--configuration $(buildConfiguration) --output $(build.artifactstagingdirectory)/TGZ.API --no-build'
    zipAfterPublish: false
    modifyOutputPath: false

- task: PublishBuildArtifacts@1
  inputs:
    PathtoPublish: '$(Build.ArtifactStagingDirectory)'
    ArtifactName: 'artifact'
    publishLocation: 'Container'