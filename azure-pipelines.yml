# ASP.NET
# Build and test ASP.NET projects.
# Add steps that publish symbols, save build artifacts, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/apps/aspnet/build-aspnet-4

trigger:
- master

pool:
  vmImage: 'windows-latest'

variables:
  solution: './TheZachZone.sln'
  tzzProjectDir: './APIs/TZZ.API'
  tgzProjectDir: './APIs/TGZ.API'
  tzzPortalDir: './Portals/the-zach-zone'
  tgzPortalDir: './Portals/the-game-zone'
  tzzProject: '$(tzzProjectDir)/TZZ.API.csproj'
  tgzProject: '$(tgzProjectDir)/TGZ.API.csproj'
  infrastructureProject: 'Shared\TZZ.Infrastructure/TZZ.Infrastructure.csproj'
  buildPlatform: 'Any CPU'
  buildConfiguration: 'Debug'

stages:
- stage: Build
  displayName: Build
  jobs:
  - job: BuildAPI
    displayName: Build API Projects

    steps:
      - task: NuGetToolInstaller@1

      - task: DotNetCoreCLI@2
        displayName: NuGet Restore
        inputs:
          command: 'restore'
          projects: '$(solution)'
          feedsToUse: 'select'

      - task: DotNetCoreCLI@2
        displayName: Build Solution
        inputs:
          command: 'build'
          projects: '$(solution)'
          arguments: '--no-restore'
          configuration: $buildConfiguration

      - task: DotNetCoreCLI@2
        displayName: Publish TheZachZone
        inputs:
          command: 'publish'
          publishWebProjects: false
          projects: '$(tzzProject)'
          arguments: '--configuration $(BuildConfiguration) --output $(build.artifactstagingdirectory)/TZZ --no-build'
          zipAfterPublish: false
          modifyOutputPath: false


      - task: DotNetCoreCLI@2
        displayName: Publish TheGameZone
        inputs:
          command: 'publish'
          publishWebProjects: false
          projects: '$(tgzProject)'
          arguments: '--configuration $(BuildConfiguration) --output $(build.artifactstagingdirectory)/TGZ --no-build'
          zipAfterPublish: false
          modifyOutputPath: false

      - task: PowerShell@2
        displayName: Build Migrations Bundle
        inputs:
          targetType: 'inline'
          script: |
            dotnet tool install dotnet-ef --global --version 8.0.0
            dotnet ef migrations bundle --project $(infrastructureProject) --force --verbose --self-contained --runtime win-x64 --output $(Build.ArtifactStagingDirectory)/efbundle.exe
      - task: PublishBuildArtifacts@1
        displayName: Publish Artifacts
        inputs:
          PathtoPublish: '$(Build.ArtifactStagingDirectory)'
          ArtifactName: 'TheZachZone'
          publishLocation: 'Container'
  - job: BuildSPA
    displayName: Build SPA Apps
    steps:
    - task: Npm@1
      displayName: 'npm: Install TheZachZone'
      inputs:
        command: 'install'
        workingDir: $(tzzPortalDir)
    - task: Npm@1
      displayName: 'npm: Install TheGameZone'
      inputs:
        command: 'install'
        workingDir: $(tgzPortalDir)
    - task: Npm@1
      displayName: 'npm: Build TheZachZone'
      inputs:
        command: 'custom'
        workingDir: $(tzzPortalDir)
        customCommand: run build
        
    - task: Npm@1
      displayName: 'npm: Build ThegameZone'
      inputs:
        command: 'custom'
        workingDir: $(tgzPortalDir)
        customCommand: run build

    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(tzzPortalDir)'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/tzz-portal'
        
    - task: CopyFiles@2
      inputs:
        SourceFolder: '$(tgzPortalDir)'
        Contents: '**'
        TargetFolder: '$(Build.ArtifactStagingDirectory)/tgz-portal'

    - task: PublishBuildArtifacts@1
      inputs:
        PathtoPublish: '$(Build.ArtifactStagingDirectory)'
        ArtifactName: 'portals'
        publishLocation: 'Container'